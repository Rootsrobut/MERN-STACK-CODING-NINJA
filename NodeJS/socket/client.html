<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
  </head>
  <body>
    <div class="chat-container">
      <div id="message-list">
        <!-- Messages will be displayed here -->
      </div>
      <input type="text" id="message-input" />
      <button id="send-message">Send</button>
    </div>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
      const socket = io.connect("http://localhost:3000");
      const username = prompt("Enter your name");
      // emit the username to server
      socket.emit("join", username);

      const messageInput = document.getElementById("message-input");
      const messageList = document.getElementById("message-list");
      const sendButton = document.getElementById("send-message");

      sendButton.addEventListener("click", function () {
        // Read the message from input and send it to the server
        const message = messageInput.value.trim();
        if (message) {
          socket.emit("new_message", message);
        }
      });
      // Display messages on UI
      socket.on("load_messages", (messages) => {
        messages.forEach((message) => {
          const messageElement = document.createElement("div");
          messageElement.innerText =
          new Date(message.timestamp).toDateString()+"-"+message.username+':'+
          message.message;
          messageList.appendChild(messageElement);
        });
      });
      // listen for broadcast message , and add it to the list.
      socket.on("broadcast_message", (userMessage) => {
        const messageElement = document.createElement("div");
        messageElement.innerText =
          userMessage.username + " : " + userMessage.message;
        messageList.appendChild(messageElement);
      });
    </script>
  </body>
</html>
